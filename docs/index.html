<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
      <link rel="icon" type="image/x-icon" href="salad.png">
      <!-- Shoutout EmojiDB :p -->
    <title>⊹₊⟡⋆To Encrypt or not to Encrypt (¬⩊¬)⊹₊⟡⋆</title>
        <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; }
        input, textarea { width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; }
        #result { margin-top: 20px; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>Caesar Cipher!</h1>
    <div class ="form-container">
        <form class ="form">
            <div class="form-group">
                <label for="text">Text</label>
                <textarea id="text" name="text" rows="4" cols="50" placeholder="Enter text here ^-^ :" required>
        </textarea>   
         </div>

         <div class="form-group">
        <label for="shift">Shift by: <span id="shiftVal">7</span></label>

        <input type="range" id="shift" min="1" max="25" value="7" oninput="shiftVal.textContent=this.value">
         </div>

        <button class="form-submit-btn" type="button" onclick="encode()">Encode</button>
        <button class="form-submit-btn" type="button" onclick="decode()">Decode</button>
    </form>
    <div id="result"></div>
    </div>
   
    <script>
        const lower = 'abcdefghijklmnopqrstuvwxyz';
        const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const punct = '!"#$%&\'()*+,-./:;<=>?@[\\]^_`{|}~';
        // DIGIT ENCRYPTION ADDED!!
        //maps digits to letters
        //also adding chaining of encryption, so some numeric vals are mapped to numbers which are THEN mapped to an alphabetical letter!

        const digitMap = {
    '0': 'm', '1': 'b', '2': 'd', '3': 'f', '4': '2',
    '5': '3', '6': '4', '7': 'h', '8': 'x', '9': 'z'
};

function mapChar(char, seen = new Set()) {
    if (seen.has(char)) return char; // loop breaking in case
    seen.add(char);
    return digitMap[char] ? mapChar(digitMap[char], seen) : char;
}

        function caesar(text, shifts) {
            const alphabets = [lower, upper, punct];
            let shiftIndex = 0;
            return text.split('').map(char => {
             const mapped = mapChar(char);
             for (const alpha of alphabets) {
            const i = alpha.indexOf(mapped);
           
             if (i !== -1) {
                const shift = shifts[shiftIndex % shifts.length];
                shiftIndex++;
                return alpha[(i + shift) % alpha.length];
            }
        }
        return mapped;
    }).join('');
}
function encode() {
    const shifts = [parseInt(document.getElementById('shift').value)];
    const text = document.getElementById('text').value;
    document.getElementById('result').textContent = caesar(text, shifts);
}

function decode() {
    const shifts = [parseInt(document.getElementById('shift').value)];
    const text = document.getElementById('text').value;
    document.getElementById('result').textContent = caesar(text, shifts.map(s => 26 - s));
}
    </script>
</body>
</html>
